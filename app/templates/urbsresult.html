{% extends "base.html" %}
{% block title %}Optimization complete | URBS Himalaya{% endblock %}
{% block content %}
<section class="model-stage">
  <div class="run-card">
    <div class="run-label">Done</div>
    <span class="eyebrow">Step 5 · Results</span>
    <h1>Optimization complete</h1>
    <p>{{ message or 'URBS has produced a new scenario result package.' }}</p>
    <form action="{{ url_for('urbs.show_results') }}" method="post">
      <button class="button button-primary button-large" type="submit">View results</button>
    </form>
    <a class="text-link" href="{{ url_for('main.index') }}">Return to home</a>
  </div>
</section>
{% endblock %}
